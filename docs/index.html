<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Strategy Backtests</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Stock Strategy Backtests</h1>
    <p class="tagline">Long-term, low-touch strategies. Reports generated locally by an AI agent.</p>
  </header>
  <main>
    <p id="status" class="muted">Loading runs…</p>
    <table id="runs" hidden>
      <thead>
        <tr>
          <th>Date</th>
          <th>Strategy</th>
          <th>Ticker</th>
          <th>Period</th>
          <th class="num">Budget</th>
          <th class="num">Final value</th>
          <th class="num">Total return</th>
          <th class="num">CAGR</th>
          <th class="num">Max DD</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="runs-body"></tbody>
    </table>
  </main>
  <footer>
    <p class="muted">
      Source: this repo. Reports are committed HTML files in <code>docs/runs/</code>; the
      list comes from <code>docs/runs.json</code>.
    </p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
